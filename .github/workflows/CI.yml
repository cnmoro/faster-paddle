name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.runner }}
    # aarch64 is built best-effort; its failure must not block publishing the
    # other platforms (the x86_64 wheel is what most servers need).
    continue-on-error: ${{ matrix.target == 'aarch64' }}
    strategy:
      fail-fast: false
      matrix:
        # x86_64 honestly needs glibc 2.34 (ONNX Runtime's pthread@GLIBC_2.34).
        # aarch64 builds NATIVELY on an arm64 runner (cross-compilation silently
        # failed to static-link libstdc++); its ONNX Runtime tops out at glibc
        # 2.28, so it's tagged manylinux_2_28.
        include:
          - target: x86_64
            runner: ubuntu-latest
            manylinux: "2_34"
          - target: aarch64
            runner: ubuntu-24.04-arm
            manylinux: "2_28"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: "true"
          manylinux: ${{ matrix.manylinux }}
          # Tell ort-sys to skip its dynamic libstdc++ link; build.rs links the
          # C++ runtime statically instead, so the wheel doesn't depend on the
          # host's libstdc++.so.6 version (manylinux GCC 11 references
          # GLIBCXX_3.4.29 symbols missing on older systems).
          before-script-linux: export ORT_CXX_STDLIB=
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: ${{ matrix.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  macos:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-14      # apple silicon
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # The medium models are too large for PyPI, so they ship as GitHub Release
  # assets and the library downloads them on demand (see fetch_cached in lib.rs).
  medium-models:
    name: Upload medium models to release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Stage assets (names must match the runtime download URL)
        run: |
          cp models/medium/det.onnx ppocrv6_medium_det.onnx
          cp models/medium/rec.onnx ppocrv6_medium_rec.onnx
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ppocrv6_medium_det.onnx
            ppocrv6_medium_rec.onnx

  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, windows, macos, sdist]
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          # Configure this secret in repo settings → Secrets → Actions.
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
